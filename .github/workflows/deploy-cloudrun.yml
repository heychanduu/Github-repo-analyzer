name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/deploy-cloudrun.yml'

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    environment:
      name: cloud-run-production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/cloud-run-source-deploy/portfolio-backend:${{ github.sha }} .
          docker tag asia-south1-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/cloud-run-source-deploy/portfolio-backend:${{ github.sha }} \
                     asia-south1-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/cloud-run-source-deploy/portfolio-backend:latest

      - name: Push Docker image to Artifact Registry
        run: |
          docker push asia-south1-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/cloud-run-source-deploy/portfolio-backend:${{ github.sha }}
          docker push asia-south1-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/cloud-run-source-deploy/portfolio-backend:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: portfolio-backend
          region: asia-south1
          image: asia-south1-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/cloud-run-source-deploy/portfolio-backend:${{ github.sha }}
          env_vars: |
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
